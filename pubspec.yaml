name: novinarko
description: Modern news reader

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  alice_lightweight: ^3.0.0
  animations: ^2.0.1
  confetti: ^0.6.0-nullsafety
  connectivity_plus: ^1.1.0
  cupertino_icons: ^1.0.2
  dio: ^4.0.0
