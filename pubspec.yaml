  flutter_staggered_animations: ^1.0.0
  flutter_staggered_grid_view: ^0.4.0
  flutter_svg: ^0.22.0
  get: ^4.3.8
  get_storage: ^2.0.3
  google_fonts: ^2.1.0
  logger: ^1.1.0
  shimmer: ^2.0.0
  url_launcher: ^6.0.10
  webfeed: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

